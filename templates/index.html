<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
        }

        .container {
            margin-top: 100px;
        }

        .card {
            background: white;
            padding: 30px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        a {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #333;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">
        <h2>💰 Expense Tracker</h2>

        <form method="POST" action="/add">
            <input type="number" name="amount" placeholder="Enter amount" required>
            <input type="text" name="category" placeholder="Enter category" required>
            <button type="submit">Add Expense</button>
        </form>

        <a href="/view">📊 View Dashboard</a>
    </div>
</div>

</body>
</html>
