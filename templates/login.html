<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <meta name="google-site-verification" content="_s66tG90r4IscNmyMIxmBVRf5BqE2-Hmd9MfihQ79qA" />

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #6b8fb3, #3b5f87);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 🔥 TOP BRAND HEADING */
        .brand {
            position: absolute;
            top: 40px;
            font-size: 28px;
            font-weight: 600;
            
            background: linear-gradient(90deg, #3a3333, #0d0d0e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            letter-spacing: 1px;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, #1e40af, #1e3a8a);
        }

        .circle1 { width: 300px; height: 300px; left: 50px; top: 80px; }
        .circle2 { width: 500px; height: 500px; right: -100px; bottom: -100px; }

        .login-box {
            width: 400px;
            padding: 50px 40px;
            border-radius: 40px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(25px);
            text-align: center;
            color: rgb(8, 8, 8);
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(20px); }
            50% { transform: translateY(0px); }
        }

        h2 {
            margin-bottom: 25px;
            font-weight: 400;
            color: #ffffff; /* change this */
        }

        .input-box {
            position: relative;
            margin-bottom: 18px;
        }

        .input-box input {
            width: 100%;
            padding: 14px 50px 14px 45px;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: rgb(4, 4, 4);
        }

        .input-box input::placeholder {
            color: #dddddd;
        }

        .input-box i.left-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #fff;
        }

        .error {
            color: #fca5a5;
            font-size: 13px;
            margin-bottom: 10px;
        }

        button {
            margin-top: 10px;
            padding: 12px;
            width: 100%;
            border-radius: 20px;
            border: none;
            background: #360cdc;
            color: #ffffff; /* change this */
            cursor: pointer;
        }


        .link {
            margin-top: 15px;
            display: block;
            color: #dddddd;
        }
    </style>
</head>

<body>

<!-- 🔥 OUTSIDE BRAND -->
<div class="brand">Expense Tracker AI</div>

<div class="circle circle1"></div>
<div class="circle circle2"></div>

<div class="login-box">

    <h2>Welcome back</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">

        <div class="input-box">
            <i class="fas fa-user left-icon"></i>
            <input name="username" placeholder="Username" required>
        </div>

        <div class="input-box">
            <i class="fas fa-lock left-icon"></i>
            <input id="password" type="password" name="password" placeholder="Password" required>
            <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
        </div>

        <button type="submit">Login</button>
    </form>

    <a href="/register" class="link">Don't have an account? Register</a>
</div>

<script>
function togglePassword() {
    const pwd = document.getElementById("password");
    const icon = document.querySelector(".toggle-password");

    const isHidden = pwd.type === "password";

    pwd.type = isHidden ? "text" : "password";

    icon.classList.toggle("fa-eye");
    icon.classList.toggle("fa-eye-slash");
}
</script>

</body>
</html>
